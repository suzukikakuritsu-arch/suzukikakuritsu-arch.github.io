<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Suzuki Emergence Universe</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', Arial, sans-serif; overflow: hidden; }
        #ui { position: fixed; top: 20px; left: 20px; z-index: 10; display: flex; gap: 10px; }
        button { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); 
            color: white; padding: 10px 18px; cursor: pointer; backdrop-filter: blur(5px);
            transition: 0.3s; border-radius: 4px;
        }
        button:hover { background: rgba(255,255,255,0.2); }
        #hud { position: fixed; top: 20px; right: 20px; font-size: 13px; text-align: right; line-height: 1.6; letter-spacing: 1px; }
        span { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <button onclick="toggleAnim()">Start / Stop</button>
    <button onclick="resetUniverse()">Reset</button>
    <button onclick="zoomOut()">Zoom Out</button>
</div>

<div id="hud">
    ENTROPY: <span id="entropy">0</span><br>
    EMERGENCE CLUSTERS: <span id="clusters">0</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer, particles, geometry;
let positions, velocity;
const N = 1600; // 記事数に同期した粒子数
let running = true;

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
    camera.position.z = 250;

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    createUniverse();
    animate();
}

function createUniverse() {
    if (particles) {
        scene.remove(particles);
        geometry.dispose();
    }

    positions = new Float32Array(N * 3);
    velocity = new Float32Array(N * 3);

    for (let i = 0; i < N; i++) {
        // 初期配置：広範囲に分散
        positions[i * 3] = (Math.random() - 0.5) * 400;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 400;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 400;

        velocity[i * 3] = (Math.random() - 0.5) * 0.2;
        velocity[i * 3 + 1] = (Math.random() - 0.5) * 0.2;
        velocity[i * 3 + 2] = (Math.random() - 0.5) * 0.2;
    }

    geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    // 粒子自体の発光表現
    const material = new THREE.PointsMaterial({
        size: 2,
        color: 0x00ffff,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending
    });

    particles = new THREE.Points(geometry, material);
    scene.add(particles);
}

function step() {
    let clusterCount = 0;
    let totalEntropy = 0;

    const posAttr = geometry.attributes.position;

    for (let i = 0; i < N; i++) {
        let ix = i * 3;
        let iy = i * 3 + 1;
        let iz = i * 3 + 2;

        let x = positions[ix];
        let y = positions[iy];
        let z = positions[iz];

        // 中心（起点）への引力シミュレーション
        let d2 = x*x + y*y + z*z + 0.1;
        let r = Math.sqrt(d2);
        
        // 万有引力的な法則を適用
        let force = -1.5 / d2; 

        velocity[ix] += (x / r) * force;
        velocity[iy] += (y / r) * force;
        velocity[iz] += (z / r) * force;

        // 速度の更新
        positions[ix] += velocity[ix];
        positions[iy] += velocity[iy];
        positions[iz] += velocity[iz];

        // エントロピーの計算（速度の分散）
        totalEntropy += Math.sqrt(velocity[ix]**2 + velocity[iy]**2 + velocity[iz]**2);

        // 特定の半径内に集まったものを「創発」と定義
        if (r < 30) clusterCount++;
    }

    posAttr.needsUpdate = true;
    document.getElementById("entropy").innerText = (totalEntropy / N * 100).toFixed(2);
    document.getElementById("clusters").innerText = clusterCount;
}

function animate() {
    requestAnimationFrame(animate);
    if (running) {
        step();
        particles.rotation.y += 0.001;
    }
    renderer.render(scene, camera);
}

// UI functions
function toggleAnim() { running = !running; }
function resetUniverse() { createUniverse(); }
function zoomOut() { camera.position.z += 50; }

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>

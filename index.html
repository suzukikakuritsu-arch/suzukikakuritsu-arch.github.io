<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Suzuki Information Emergence</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

section{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
max-width:700px;
opacity:0.75;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<section>
<h1>Suzuki Information Emergence</h1>
<p>11D Information Field → Universe → Life → Molecules → Intelligence</p>
</section>

<section>
<h1>Cosmic Web</h1>
<p>Large scale structure formation</p>
</section>

<section>
<h1>Life Emergence</h1>
<p>Self-organizing information networks</p>
</section>

<section>
<h1>Molecular Systems</h1>
<p>Complex chemical attractors</p>
</section>

<section>
<h1>Artificial Intelligence</h1>
<p>Information evolution</p>
</section>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const canvas=document.getElementById("bg")

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

camera.position.z=80

const renderer=new THREE.WebGLRenderer({canvas})

renderer.setSize(window.innerWidth,window.innerHeight)


// --------------------
// 粒子生成
// --------------------

const N=1500

let positions=new Float32Array(N3)
let velocity=new Float32Array(N3)

for(let i=0;i<N;i++){

positions[i3]=(Math.random()-0.5)120
positions[i3+1]=(Math.random()-0.5)120
positions[i3+2]=(Math.random()-0.5)120

velocity[i3]=(Math.random()-0.5)0.03
velocity[i3+1]=(Math.random()-0.5)0.03
velocity[i3+2]=(Math.random()-0.5)0.03

}

const geometry=new THREE.BufferGeometry()

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

const material=new THREE.PointsMaterial({
size:0.8
})

const particles=new THREE.Points(geometry,material)

scene.add(particles)


// --------------------
// スクロール
// --------------------

let scrollY=0

window.addEventListener("scroll",()=>{

scrollY=window.scrollY

})


// --------------------
// 創発ダイナミクス
// --------------------

function step(){

for(let i=0;i<N;i++){

let x=positions[i3]
let y=positions[i3+1]
let z=positions[i3+2]

let r=Math.sqrt(xx+yy+zz)+0.0001

let force=-0.0003r

velocity[i3]+=forcex/r
velocity[i3+1]+=forcey/r
velocity[i3+2]+=forcez/r

positions[i3]+=velocity[i3]
positions[i3+1]+=velocity[i3+1]
positions[i3+2]+=velocity[i3+2]

}

geometry.attributes.position.needsUpdate=true

}


// --------------------
// アニメーション
// --------------------

function animate(){

requestAnimationFrame(animate)

step()

particles.rotation.y+=0.0006
particles.rotation.x+=0.0002

camera.position.z=80 + scrollY0.05

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Suzuki Cosmic Web - 線強化版 v2.2</title>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #0a0a1f 0%, #000002 70%); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }
        #ui { position: fixed; top: 20px; left: 20px; z-index: 10; }
        button { 
            background: linear-gradient(45deg, rgba(255,200,100,0.5), rgba(100,200,255,0.6)); 
            border: 2px solid rgba(255,255,255,0.8); 
            color: #fff; 
            padding: 12px 24px; 
            cursor: pointer; 
            margin-right: 8px;
            border-radius: 25px; 
            font-weight: bold; 
            transition: all 0.4s ease;
            font-size: 14px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(255,200,100,0.4);
        }
        button:hover { 
            background: linear-gradient(45deg, rgba(255,255,100,0.9), rgba(100,255,255,0.9)); 
            box-shadow: 0 0 50px rgba(255,255,255,1); 
            transform: scale(1.05);
        }
        #hud { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            text-align: right; 
            font-family: 'Orbitron', monospace; 
            font-size: 16px;
            text-shadow: 0 0 15px #ffffff;
        }
        .val { 
            color: #ffff88; 
            font-weight: bold; 
            text-shadow: 0 0 12px #ffff88;
            font-size: 20px;
        }
        #info { 
            position: fixed; 
            bottom: 20px; 
            left: 20px; 
            max-width: 450px; 
            background: rgba(10,10,40,0.8); 
            padding: 20px; 
            border-radius: 20px; 
            border: 2px solid rgba(255,255,200,0.6); 
            backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(255,255,255,0.3);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="ui">
    <button onclick="toggleAnim()">🌌 Start Web</button>
    <button onclick="resetUniverse()">🔄 Recreate</button>
    <button onclick="toggleWebLines()">🕸️ Lines ON</button>
    <button onclick="boostLines()">⚡ More Lines</button>
</div>

<div id="hud">
    FIBERS: <span id="fibers" class="val">0</span><br>
    NODES: <span id="nodes" class="val">0</span><br>
    LINES: <span id="lines" class="val">0</span><br>
    CONNECT: <span id="connectivity" class="val">0</span><br>
    TIME: <span id="time" class="val">0</span>s
</div>

<div id="info">
    <h3>🌌 Suzuki Cosmic Web v2.2 - 線強化</h3>
    <p><strong>超高密度宇宙網生成</strong></p>
    <p>• 🕸️ LINES: フィラメント接続数<br>• Boostで線密度3倍<br>• suzukikakuritsu-arch完全再現</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer, particles, lines;
let positions, velocities, colors, geometry;
const N = 6000;
let running = true;
let time = 0;
let showWebLines = true;
let linkDistance = 150; // 線接続距離
let lineBoost = 1.0;
let currentLines = 0;

const G = 0.15;
const DT = 0.02;

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0a0a1f, 0.0006);
    
    // 輝く宇宙背景
    const bgGeometry = new THREE.SphereGeometry(4000, 64, 64);
    const bgMaterial = new THREE.MeshBasicMaterial({
        color: 0x001133,
        side: THREE.BackSide,
        transparent: true,
        opacity: 0.4
    });
    scene.add(new THREE.Mesh(bgGeometry, bgMaterial));
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
    camera.position.set(0, 300, 1500);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x0a0a1f);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.8;
    document.body.appendChild(renderer.domElement);

    createCosmicWeb();
    animate();
}

function createCosmicWeb() {
    if (particles) scene.remove(particles);
    if (lines) scene.remove(lines);

    positions = new Float32Array(N * 3);
    velocities = new Float32Array(N * 3);
    colors = new Float32Array(N * 3);

    // フィラメント重視初期配置
    for (let i = 0; i < N; i++) {
        let idx = i * 3;
        positions[idx] = (Math.random() - 0.5) * 1200;
        positions[idx + 1] = (Math.random() - 0.5) * 300;
        positions[idx + 2] = (Math.random() - 0.5) * 1200;

        velocities[idx] = (Math.random() - 0.5) * 0.08;
        velocities[idx + 1] = (Math.random() - 0.5) * 0.12;
        velocities[idx + 2] = (Math.random() - 0.5) * 0.08;

        const hue = 0.6 + (i / N) * 0.3;
        const hsv = hsvToRgb(hue, 0.95, 1.0);
        colors[idx] = hsv[0];
        colors[idx + 1] = hsv[1];
        colors[idx + 2] = hsv[2];
    }

    geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const particleMaterial = new THREE.PointsMaterial({
        size: 8,
        vertexColors: true,
        transparent: true,
        opacity: 1.0,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
    });
    particles = new THREE.Points(geometry, particleMaterial);
    scene.add(particles);

    updateWebLines();
}

function hsvToRgb(h, s, v) {
    const i = Math.floor(h * 6);
    const f = h * 6 - i;
    const p = v * (1 - s);
    const q = v * (1 - f * s);
    const t = v * (1 - (1 - f) * s);
    let r, g, b;
    switch (i % 6) {
        case 0: r = v; g = t; b = p; break;
        case 1: r = q; g = v; b = p; break;
        case 2: r = p; g = v; b = t; break;
        case 3: r = p; g = q; b = v; break;
        case 4: r = t; g = p; b = v; break;
        case 5: r = v; g = p; b = q; break;
    }
    return [r, g, b];
}

function updateWebLines() {
    if (lines) scene.remove(lines);
    
    const pos = geometry.attributes.position.array;
    const linePositions = [];
    const lineColors = [];
    let lineCount = 0;

    // 高密度線生成
    for (let i = 0; i < N; i++) {
        const idx = i * 3;
        const x1 = pos[idx], y1 = pos[idx+1], z1 = pos[idx+2];
        
        // より多くの近傍チェック
        for (let j = i + 1; j < N && j < i + 50; j++) {
            const jdx = j * 3;
            const dx = pos[jdx] - x1;
            const dy = pos[jdx+1] - y1;
            const dz = pos[jdx+2] - z1;
            const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
            
            if (dist < linkDistance * lineBoost && dist > 15) {
                linePositions.push(x1, y1, z1, pos[jdx], pos[jdx+1], pos[jdx+2]);
                
                // 距離に応じた線色
                const alpha = 1.0 - (dist / (linkDistance * lineBoost));
                const avgColor = [
                    (colors[idx] + colors[jdx]) * 0.5,
                    (colors[idx+1] + colors[jdx+1]) * 0.5,
                    (colors[idx+2] + colors[jdx+2]) * 0.5
                ];
                lineColors.push(...avgColor, alpha, ...avgColor, alpha);
                lineCount++;
            }
        }
    }

    currentLines = lineCount;

    if (lineCount > 0) {
        const lineGeometry = new THREE.BufferGeometry();
        lineGeometry.setAttribute('position', new Float32Array(linePositions));
        lineGeometry.setAttribute('color', new Float32Array(lineColors));

        const lineMaterial = new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            linewidth: 3
        });

        lines = new THREE.LineSegments(lineGeometry, lineMaterial);
        if (showWebLines) scene.add(lines);
    }
}

function step() {
    const pos = geometry.attributes.position.array;
    let fiberCount = 0, nodeCount = 0, connectivity = 0;

    // N-body物理
    for (let i = 0; i < N; i++) {
        let idx = i * 3;
        let fx = 0, fy = 0, fz = 0;
        
        for (let j = 0; j < N; j++) {
            if (i === j) continue;
            let jdx = j * 3;
            let dx = pos[jdx] - pos[idx];
            let dy = pos[jdx+1] - pos[idx+1];
            let dz = pos[jdx+2] - pos[idx+2];
            let distSq = dx*dx + dy*dy + dz*dz + 0.05;
            
            if (distSq < 80000) {
                let force = G / distSq;
                fx += dx / Math.sqrt(distSq) * force;
                fy += dy / Math.sqrt(distSq) * force;
                fz += dz / Math.sqrt(distSq) * force;
            }
        }
        
        velocities[idx] += fx * DT;
        velocities[idx+1] += fy * DT;
        velocities[idx+2] += fz * DT;
        
        velocities[idx] *= 0.994;
        velocities[idx+1] *= 0.994;
        velocities[idx+2] *= 0.994;
        
        pos[idx] += velocities[idx] * DT;
        pos[idx+1] += velocities[idx+1] * DT;
        pos[idx+2] += velocities[idx+2] * DT;

        const dist = Math.hypot(pos[idx], pos[idx+1], pos[idx+2]);
        if (dist > 3000) {
            pos[idx] *= 2800 / dist;
            pos[idx+1] *= 2800 / dist;
            pos[idx+2] *= 2800 / dist;
        }
        
        if (dist < 70) nodeCount++;
        if (dist < 250 && dist > 100) fiberCount++;
        connectivity += Math.min(8, 800 / (dist + 10));
    }

    geometry.attributes.position.needsUpdate = true;
    
    // 毎フレーム線更新（高頻度）
    if (showWebLines) updateWebLines();
    
    document.getElementById("fibers").innerText = fiberCount;
    document.getElementById("nodes").innerText = nodeCount;
    document.getElementById("lines").innerText = currentLines;
    document.getElementById("connectivity").innerText = connectivity.toFixed(0);
    document.getElementById("time").innerText = time.toFixed(0);
}

function animate() {
    requestAnimationFrame(animate);
    if (running) {
        step();
        time += 1;
    }
    
    particles.rotation.y += 0.002;
    particles.rotation.x += 0.001;
    
    const camTime = time * 0.00015;
    camera.position.x = Math.sin(camTime) * 1000;
    camera.position.y = Math.sin(camTime * 1.4) * 500;
    camera.position.z = 1500 + Math.cos(camTime * 0.6) * 600;
    camera.lookAt(0, 0, 0);
    
    renderer.render(scene, camera);
}

function toggleAnim() { 
    running = !running; 
    document.querySelector('button:first-child').innerText = running ? '⏸️ Pause Web' : '🌌 Start Web';
}

function resetUniverse() { 
    createCosmicWeb(); 
    time = 0;
}

function toggleWebLines() {
    showWebLines = !showWebLines;
    if (showWebLines && lines) scene.add(lines);
    else if (lines) scene.remove(lines);
    document.querySelector('button:nth-child(3)').innerText = showWebLines ? '🕸️ Lines OFF' : '🕸️ Lines ON';
}

function boostLines() {
    lineBoost = lineBoost === 1.0 ? 3.0 : 1.0;
    linkDistance = lineBoost === 3.0 ? 200 : 150;
    document.querySelector('button:last-child').innerText = lineBoost === 3.0 ? '🔹 Normal Lines' : '⚡ More Lines';
    updateWebLines();
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Suzuki Emergence Universe - Cosmic Web v2.1</title>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #0a0a1f 0%, #000002 70%); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }
        #ui { 
            position: fixed; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
        }
        button { 
            background: linear-gradient(45deg, rgba(255,200,100,0.4), rgba(100,200,255,0.5)); 
            border: 2px solid rgba(255,255,255,0.6); 
            color: #fff; 
            padding: 12px 24px; 
            cursor: pointer; 
            margin-right: 8px;
            border-radius: 25px; 
            font-weight: bold; 
            transition: all 0.4s ease;
            font-size: 14px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(255,200,100,0.3);
        }
        button:hover { 
            background: linear-gradient(45deg, rgba(255,255,100,0.8), rgba(100,255,255,0.8)); 
            box-shadow: 0 0 40px rgba(255,255,255,0.9); 
            transform: scale(1.05);
        }
        #hud { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            text-align: right; 
            font-family: 'Orbitron', monospace; 
            font-size: 16px;
            text-shadow: 0 0 15px #ffffff;
        }
        .val { 
            color: #ffff88; 
            font-weight: bold; 
            text-shadow: 0 0 12px #ffff88;
            font-size: 20px;
        }
        #info { 
            position: fixed; 
            bottom: 20px; 
            left: 20px; 
            max-width: 450px; 
            background: rgba(10,10,40,0.7); 
            padding: 20px; 
            border-radius: 20px; 
            border: 2px solid rgba(255,255,200,0.5); 
            backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(255,255,255,0.2);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="ui">
    <button onclick="toggleAnim()">🌌 Start Web</button>
    <button onclick="resetUniverse()">🔄 Recreate</button>
    <button onclick="randomizeColors()">💫 Colors</button>
    <button onclick="toggleWeb()">🕸️ Web Mode</button>
</div>

<div id="hud">
    FIBERS: <span id="fibers" class="val">0</span><br>
    NODES: <span id="nodes" class="val">0</span><br>
    CONNECT: <span id="connectivity" class="val">0</span><br>
    ENERGY: <span id="energy" class="val">0</span><br>
    TIME: <span id="time" class="val">0</span>s
</div>

<div id="info">
    <h3>🌌 Suzuki Cosmic Web Generator</h3>
    <p><strong>宇宙の大規模構造生成</strong><br>フィラメント・ウォール・ボイド形成シミュレーション</p>
    <p>観測:<br>
    • FIBERS: 宇宙糸密度<br>
    • NODES: 超クラスター数<br>
    • CONNECT: 連結強度</p>
    <p>suzukikakuritsu-arch風 輝く宇宙網！</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer, particles, lines, geometry;
let positions, velocities, colors;
const N = 8000; // 宇宙網スケール
let running = true;
let time = 0;
let showWebLines = true;
let webStrength = 1.0;

const G = 0.12;
const DT = 0.02;
const LINK_DISTANCE = 120;

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0a0a1f, 0.0008);
    
    // 輝く背景星雲
    const bgGeometry = new THREE.SphereGeometry(3000, 64, 64);
    const bgMaterial = new THREE.MeshBasicMaterial({
        color: 0x001122,
        side: THREE.BackSide,
        transparent: true,
        opacity: 0.3
    });
    scene.add(new THREE.Mesh(bgGeometry, bgMaterial));
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
    camera.position.set(0, 200, 1200);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x0a0a1f);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.5;
    document.body.appendChild(renderer.domElement);

    createCosmicWeb();
    animate();
}

function createCosmicWeb() {
    if (particles) scene.remove(particles);
    if (lines) scene.remove(lines);

    positions = new Float32Array(N * 3);
    velocities = new Float32Array(N * 3);
    colors = new Float32Array(N * 3);

    // 宇宙網特有のフィラメント初期配置
    for (let i = 0; i < N; i++) {
        let idx = i * 3;
        
        // フィラメント状分布 (長軸方向)
        const filamentX = (Math.random() - 0.5) * 800;
        const filamentY = (Math.random() - 0.5) * 200;
        const filamentZ = (Math.random() - 0.5) * 800;
        
        positions[idx] = filamentX;
        positions[idx + 1] = filamentY * 0.3;  // Y圧縮で板状
        positions[idx + 2] = filamentZ;

        velocities[idx] = (Math.random() - 0.5) * 0.1;
        velocities[idx + 1] = (Math.random() - 0.5) * 0.15;
        velocities[idx + 2] = (Math.random() - 0.5) * 0.1;

        // 輝くスペクトルカラー
        const hue = i / N * 0.3 + 0.5;
        const hsv = hsvToRgb(hue, 0.9, 0.9);
        colors[idx] = hsv[0];
        colors[idx + 1] = hsv[1];
        colors[idx + 2] = hsv[2];
    }

    // 粒子システム
    geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const particleMaterial = new THREE.PointsMaterial({
        size: 6,
        vertexColors: true,
        transparent: true,
        opacity: 0.95,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
    });
    particles = new THREE.Points(geometry, particleMaterial);
    scene.add(particles);

    updateWebLines();
}

function hsvToRgb(h, s, v) {
    const i = Math.floor(h * 6);
    const f = h * 6 - i;
    const p = v * (1 - s);
    const q = v * (1 - f * s);
    const t = v * (1 - (1 - f) * s);
    let r, g, b;
    switch (i % 6) {
        case 0: r = v; g = t; b = p; break;
        case 1: r = q; g = v; b = p; break;
        case 2: r = p; g = v; b = t; break;
        case 3: r = p; g = q; b = v; break;
        case 4: r = t; g = p; b = v; break;
        case 5: r = v; g = p; b = q; break;
    }
    return [r, g, b];
}

function updateWebLines() {
    if (lines) scene.remove(lines);
    
    const pos = geometry.attributes.position.array;
    const linePositions = [];
    
    // 近傍粒子間接続 (宇宙網フィラメント)
    for (let i = 0; i < N; i++) {
        const idx = i * 3;
        const x1 = pos[idx], y1 = pos[idx+1], z1 = pos[idx+2];
        
        for (let j = i + 1; j < N && j < i + 20; j++) { // 近傍20個
            const jdx = j * 3;
            const dx = pos[jdx] - x1;
            const dy = pos[jdx+1] - y1;
            const dz = pos[jdx+2] - z1;
            const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
            
            if (dist < LINK_DISTANCE && dist > 10) {
                linePositions.push(x1, y1, z1, pos[jdx], pos[jdx+1], pos[jdx+2]);
            }
        }
    }
    
    const lineGeometry = new THREE.BufferGeometry();
    lineGeometry.setAttribute('position', new Float32Array(linePositions));
    
    const lineMaterial = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: 0.4 * webStrength,
        blending: THREE.AdditiveBlending,
        linewidth: 2
    });
    
    lines = new THREE.LineSegments(lineGeometry, lineMaterial);
    if (showWebLines) scene.add(lines);
}

function step() {
    const pos = geometry.attributes.position.array;
    let fiberCount = 0, nodeCount = 0, connectivity = 0;

    // 宇宙網重力 + フィラメント形成力
    for (let i = 0; i < N; i++) {
        let idx = i * 3;
        let fx = 0, fy = 0, fz = 0;
        const x = pos[idx], y = pos[idx+1], z = pos[idx+2];
        
        // N-body近似 + フィラメント引力
        for (let j = 0; j < N; j++) {
            if (i === j) continue;
            let jdx = j * 3;
            let dx = pos[jdx] - x;
            let dy = pos[jdx+1] - y;
            let dz = pos[jdx+2] - z;
            let distSq = dx*dx + dy*dy + dz*dz + 0.1;
            
            if (distSq < 50000) {
                let force = G / distSq;
                fx += dx / Math.sqrt(distSq) * force;
                fy += dy / Math.sqrt(distSq) * force;
                fz += dz / Math.sqrt(distSq) * force;
            }
        }
        
        velocities[idx] += fx * DT;
        velocities[idx+1] += fy * DT;
        velocities[idx+2] += fz * DT;
        
        velocities[idx] *= 0.992;
        velocities[idx+1] *= 0.992;
        velocities[idx+2] *= 0.992;
        
        pos[idx] += velocities[idx] * DT;
        pos[idx+1] += velocities[idx+1] * DT;
        pos[idx+2] += velocities[idx+2] * DT;

        // 宇宙網スケール境界
        const dist = Math.hypot(x, y, z);
        if (dist > 2500) {
            pos[idx] = x * 2400 / dist;
            pos[idx+1] = y * 2400 / dist;
            pos[idx+2] = z * 2400 / dist;
        }
        
        if (dist < 80) nodeCount++;
        if (dist < 200 && dist > 100) fiberCount++;
        connectivity += Math.min(5, 500 / (dist + 10));
    }

    geometry.attributes.position.needsUpdate = true;
    
    // Web線更新 (適度な頻度)
    if (Math.random() < 0.1) updateWebLines();
    
    document.getElementById("fibers").innerText = fiberCount;
    document.getElementById("nodes").innerText = nodeCount;
    document.getElementById("connectivity").innerText = connectivity.toFixed(0);
    document.getElementById("energy").innerText = (time * 0.01).toFixed(1);
    document.getElementById("time").innerText = time.toFixed(0);
}

function animate() {
    requestAnimationFrame(animate);
    if (running) {
        step();
        time += 1;
    }
    
    // 宇宙網回転
    particles.rotation.y += 0.002;
    particles.rotation.x += 0.0005;
    
    // 流動的カメラ
    const camTime = time * 0.0002;
    camera.position.x = Math.sin(camTime) * 800;
    camera.position.y = Math.sin(camTime * 1.3) * 400;
    camera.position.z = 1200 + Math.cos(camTime * 0.7) * 500;
    camera.lookAt(0, 0, 0);
    
    renderer.render(scene, camera);
}

function toggleAnim() { 
    running = !running; 
    document.querySelector('button:first-child').innerText = running ? '⏸️ Pause Web' : '🌌 Start Web';
}

function resetUniverse() { 
    createCosmicWeb(); 
    time = 0;
}

function randomizeColors() {
    const col = geometry.attributes.color.array;
    for (let i = 0; i < N; i++) {
        let idx = i * 3;
        const hue = Math.random() * 0.5 + 0.5;
        const hsv = hsvToRgb(hue, 1, 1);
        col[idx] = hsv[0];
        col[idx+1] = hsv[1];
        col[idx+2] = hsv[2];
    }
    geometry.attributes.color.needsUpdate = true;
}

function toggleWeb() {
    showWebLines = !showWebLines;
    webStrength = showWebLines ? 1.2 : 0.3;
    if (showWebLines && lines) scene.add(lines);
    else if (lines) scene.remove(lines);
    document.querySelector('button:last-child').innerText = showWebLines ? '🕸️ Hide Web' : '🕸️ Show Web';
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Suzuki Emergence Universe</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

#ui{
position:fixed;
top:20px;
left:20px;
z-index:10;
}

button{
margin:5px;
padding:8px 14px;
font-size:14px;
cursor:pointer;
}

#hud{
position:fixed;
top:20px;
right:20px;
font-size:14px;
}

</style>

</head>

<body>

<div id="ui">

<button onclick="toggleAnim()">Start / Stop</button>

<button onclick="resetUniverse()">Reset Universe</button>

<button onclick="zoomOut()">Zoom Out</button>

</div>

<div id="hud">

Entropy: <span id="entropy">0</span><br>
Clusters: <span id="clusters">0</span>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
)

camera.position.z=120

const renderer=new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)


// ----------------
// 粒子
// ----------------

const N=1500

let positions
let velocity
let geometry
let particles

function createUniverse(){

positions=new Float32Array(N3)
velocity=new Float32Array(N3)

for(let i=0;i<N;i++){

positions[i3]=(Math.random()-0.5)150
positions[i3+1]=(Math.random()-0.5)150
positions[i3+2]=(Math.random()-0.5)150

velocity[i3]=(Math.random()-0.5)0.05
velocity[i3+1]=(Math.random()-0.5)0.05
velocity[i3+2]=(Math.random()-0.5)0.05

}

geometry=new THREE.BufferGeometry()

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

const material=new THREE.PointsMaterial({size:1})

particles=new THREE.Points(geometry,material)

scene.add(particles)

}

createUniverse()


// ----------------
// ダイナミクス
// ----------------

function step(){

let clusters=0
let entropy=0

for(let i=0;i<N;i++){

let x=positions[i3]
let y=positions[i3+1]
let z=positions[i3+2]

let r=Math.sqrt(xx+yy+zz)+0.0001

let force=-0.0005r

velocity[i3]+=forcex/r
velocity[i3+1]+=forcey/r
velocity[i3+2]+=forcez/r

positions[i3]+=velocity[i3]
positions[i3+1]+=velocity[i3+1]
positions[i3+2]+=velocity[i*3+2]

entropy+=Math.abs(force)

if(r<20) clusters++

}

geometry.attributes.position.needsUpdate=true

document.getElementById("entropy").innerText=entropy.toFixed(3)

document.getElementById("clusters").innerText=clusters

}


// ----------------
// UI操作
// ----------------

let running=true

function toggleAnim(){

running=!running

}

function resetUniverse(){

scene.remove(particles)

createUniverse()

}

function zoomOut(){

camera.position.z+=20

}


// ----------------
// アニメーション
// ----------------

function animate(){

requestAnimationFrame(animate)

if(running){

step()

particles.rotation.y+=0.0005

}

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Universal Emergence Simulator</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:Arial;
}

#title{
position:absolute;
top:20px;
left:20px;
font-size:22px;
}

#info{
position:absolute;
bottom:20px;
left:20px;
font-size:14px;
opacity:0.7;
}

</style>

</head>

<body>

<div id="title">
Universal Emergence Simulator<br>
Suzuki Information Emergence Model
</div>

<div id="info">
11D → 3D Projection / Emergence Dynamics
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const PHI=(1+Math.sqrt(5))/2
const DIM_HIGH=11
const DIM_LOW=3
const N=600

// ------------------
// 高次元生成
// ------------------

function generateUniverse(){

let arr=[]

for(let i=0;i<N;i++){

let p=[]

for(let d=0;d<DIM_HIGH;d++){

p.push((Math.random()-0.5)*2)

}

arr.push(p)

}

return arr
}


// ------------------
// 準結晶射影
// ------------------

function project(points){

let M=[]

for(let i=0;i<DIM_HIGH;i++){

let row=[]

for(let j=0;j<DIM_LOW;j++){

row.push(Math.random())

}

M.push(row)

}

M[0][0]*=PHI
M[1][1]*=PHI

let out=[]

for(let p of points){

let q=[0,0,0]

for(let i=0;i<DIM_HIGH;i++){

for(let j=0;j<DIM_LOW;j++){

q[j]+=p[i]*M[i][j]

}

}

out.push(q)

}

return out

}


// ------------------
// 情報相互作用
// ------------------

function interaction(points){

let J=[]

for(let i=0;i<N;i++){

J[i]=[]

for(let j=0;j<N;j++){

if(i===j){

J[i][j]=0
continue

}

let dx=points[i][0]-points[j][0]
let dy=points[i][1]-points[j][1]
let dz=points[i][2]-points[j][2]

let d=Math.sqrt(dx*dx+dy*dy+dz*dz)

J[i][j]=Math.exp(-d)

}

}

return J

}


// ------------------
// 創発ダイナミクス
// ------------------

function step(X,J){

let newX=[]

for(let i=0;i<N;i++){

let inf=[0,0,0]

for(let j=0;j<N;j++){

inf[0]+=J[i][j]*X[j][0]
inf[1]+=J[i][j]*X[j][1]
inf[2]+=J[i][j]*X[j][2]

}

newX[i]=[

X[i][0]+0.01*(inf[0]-X[i][0]),
X[i][1]+0.01*(inf[1]-X[i][1]),
X[i][2]+0.01*(inf[2]-X[i][2])

]

}

return newX

}


// ------------------
// THREE.js
// ------------------

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer=new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.z=40


// ------------------
// シミュレーション
// ------------------

let universe=generateUniverse()
let points=project(universe)
let J=interaction(points)

const geometry=new THREE.BufferGeometry()

let positions=new Float32Array(N*3)

for(let i=0;i<N;i++){

positions[i*3]=points[i][0]
positions[i*3+1]=points[i][1]
positions[i*3+2]=points[i][2]

}

geometry.setAttribute(
'position',
new THREE.BufferAttribute(positions,3)
)

const material=new THREE.PointsMaterial({

size:0.2

})

const particles=new THREE.Points(geometry,material)

scene.add(particles)


// ------------------
// アニメーション
// ------------------

function animate(){

requestAnimationFrame(animate)

points=step(points,J)

for(let i=0;i<N;i++){

positions[i*3]=points[i][0]
positions[i*3+1]=points[i][1]
positions[i*3+2]=points[i][2]

}

geometry.attributes.position.needsUpdate=true

particles.rotation.y+=0.001

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>

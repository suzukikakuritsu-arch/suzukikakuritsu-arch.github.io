<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Suzuki Emergence Universe</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #ui { position: fixed; top: 20px; left: 20px; z-index: 10; }
        button { 
            background: rgba(255,255,255,0.15); border: 1px solid #555; 
            color: #fff; padding: 8px 15px; cursor: pointer; margin-right: 5px;
        }
        #hud { position: fixed; top: 20px; right: 20px; text-align: right; font-family: monospace; }
        .val { color: #00ffff; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <button onclick="toggleAnim()">Start / Stop</button>
    <button onclick="resetUniverse()">Reset</button>
</div>

<div id="hud">
    ENTROPY: <span id="entropy" class="val">0</span><br>
    EMERGENCE: <span id="clusters" class="val">0</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer, particles, geometry;
let positions, velocities;
const N = 1600; // 1600の知性
let running = true;

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.z = 400;

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    createUniverse();
    animate();
}

function createUniverse() {
    if (particles) scene.remove(particles);

    positions = new Float32Array(N * 3);
    velocities = new Float32Array(N * 3);

    for (let i = 0; i < N; i++) {
        let idx = i * 3;
        // 初期配置を球状に分散
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos((Math.random() * 2) - 1);
        const r = 200 + Math.random() * 100;

        positions[idx] = r * Math.sin(phi) * Math.cos(theta);
        positions[idx + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[idx + 2] = r * Math.cos(phi);

        velocities[idx] = (Math.random() - 0.5) * 0.5;
        velocities[idx + 1] = (Math.random() - 0.5) * 0.5;
        velocities[idx + 2] = (Math.random() - 0.5) * 0.5;
    }

    geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const material = new THREE.PointsMaterial({
        size: 3,
        color: 0x00ccff,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending
    });

    particles = new THREE.Points(geometry, material);
    scene.add(particles);
}

function step() {
    const pos = geometry.attributes.position.array;
    let clusterCount = 0;
    let totalEnergy = 0;

    for (let i = 0; i < N; i++) {
        let idx = i * 3;
        
        let x = pos[idx];
        let y = pos[idx + 1];
        let z = pos[idx + 2];

        let distSq = x*x + y*y + z*z + 0.1;
        let dist = Math.sqrt(distSq);

        // 中心（起点）への引き込み
        let force = -2.0 / distSq; 
        
        velocities[idx] += (x / dist) * force;
        velocities[idx+1] += (y / dist) * force;
        velocities[idx+2] += (z / dist) * force;

        // 摩擦係数（発散防止）
        velocities[idx] *= 0.99;
        velocities[idx+1] *= 0.99;
        velocities[idx+2] *= 0.99;

        pos[idx] += velocities[idx];
        pos[idx+1] += velocities[idx+1];
        pos[idx+2] += velocities[idx+2];

        totalEnergy += Math.abs(velocities[idx]) + Math.abs(velocities[idx+1]);
        if (dist < 50) clusterCount++;
    }

    geometry.attributes.position.needsUpdate = true;
    document.getElementById("entropy").innerText = (totalEnergy / 10).toFixed(2);
    document.getElementById("clusters").innerText = clusterCount;
}

function animate() {
    requestAnimationFrame(animate);
    if (running) {
        step();
        particles.rotation.y += 0.002;
    }
    renderer.render(scene, camera);
}

function toggleAnim() { running = !running; }
function resetUniverse() { createUniverse(); }

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>
